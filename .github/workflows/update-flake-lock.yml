name: Update flake.lock

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-lock:
    runs-on: [self-hosted, Linux, X64, nixos]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "chore(nix): update flake.lock"
          pr-labels: dependencies,automated
          # PAT/App token so the PR triggers CI (GITHUB_TOKEN won't).
          # Ref: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
          token: ${{ secrets.FLAKE_UPDATE_GITHUB_TOKEN }}
